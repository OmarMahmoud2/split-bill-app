name: split_bill_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.1.0+8

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  provider: ^6.1.2
  image_picker: ^1.2.1
  http: ^1.6.0
  uuid: ^4.5.2
  image_cropper: ^11.0.0
  qr_flutter: ^4.1.0       # To generate your QR
  mobile_scanner: ^7.1.4   # To scan friends' QRs
  permission_handler: ^12.0.1 
  flutter_contacts: ^1.1.9
  share_plus: ^12.0.1
  google_mobile_ads: ^7.0.0
  flutter_fortune_wheel: ^1.3.2
  rxdart: ^0.28.0 # Required by fortune_wheel
  url_launcher: ^6.3.2
  firebase_storage: ^13.0.5
  app_links: ^7.0.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  googleapis_auth: ^2.0.0
  intl_phone_field: ^3.2.0
  google_fonts: ^6.3.3
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.4
  lottie: ^3.3.2
  intl: ^0.20.2
  easy_localization: ^3.0.8
  in_app_review: ^2.0.11
  upgrader: ^12.3.0
  image_picker_web: ^3.1.1
  universal_html: ^2.2.4
  purchases_flutter: ^9.10.2  # RevenueCat for in-app purchases (updated to fix iOS build)
  app_tracking_transparency: ^2.0.6+1
  record: ^6.1.2
  path_provider: ^2.1.5
  audio_waveforms: ^2.0.1
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3
  change_app_package_name: ^1.5.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo.png
    - assets/onboarding/
    - assets/animations/
    - assets/payments/
    - assets/translations/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#667EEA"
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"  # White background (Android will adapt to theme)
  adaptive_icon_foreground: "assets/logo.png"
  remove_alpha_ios: true

# Splash Screen Configuration
flutter_native_splash:
  color: "#ffffff" # White background as requested
  image: assets/logo.png
  android: true
  ios: true
  web: true
  android_12:
    icon_background_color: "#ffffff"
    image: assets/logo.png
